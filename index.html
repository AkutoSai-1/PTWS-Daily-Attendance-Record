<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="icon" type="image/x-icon" href="assets/logo.png" />
    <link rel="stylesheet" href="css/font-awesome.css" />
    <title>PTWS Attendance Tracker</title>
  </head>
  <body>
    <header>
      <button id="helpBtn" title="How to use">
        <i class="fa fa-question-circle"></i> Help
      </button>
      <img src="assets/logo.png" alt="PTWS" />
      <h1>Princes Town West Secondary School</h1>
    </header>
    <div class="roll-call">
      <div class="table-group">
        <button id="plus">+</button>
        <button id="downloadBtn" title="Download Daily Report">
          <i class="fa fa-download"></i>
        </button>
        <div id="table">
          <table>
            <thead>
              <tr>
                <th>FirstName</th>
                <th>SurName</th>
                <th>Class</th>
                <th>Gender</th>
                <th>Date</th>
                <th>Attendance</th>
                <th class="trash-col"></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
    <footer>
      <p>
        &copy; 2026 Princes Town West Secondary School. All rights reserved.
      </p>
      <nav>
        <a
          href="#"
          class="secure-email"
          data-user="princestownwest.sec"
          data-domain="fac.edu.tt"
          >Contact Us</a
        >

        | <a href="html/privacy.html">Privacy Policy</a> |
        <a href="html/terms.html">Terms of Service</a>
      </nav>
    </footer>

    <div id="policyModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>
  </body>
</html>
<script src="./js/index.js"></script>
<script src="./js/save.js"></script>
<script src="./js/modal.js"></script>
